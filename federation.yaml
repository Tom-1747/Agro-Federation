openapi: 3.1.0

info:
  title: Agricultural Collectivity Federation API
  description: |
    OpenAPI specification for the National Federation of Agricultural Collectivities.

    # Versioning
    - v0.0.1 : Collectivities & Members creation
    - v0.0.2 : Collectivity informations
    - v0.0.3 : Membership fees, transactions, payments
    - v0.0.4 : Full federation features
  version: 0.0.4

servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: Collectivities
  - name: Members
  - name: Contributions
  - name: Treasury
  - name: Activities
  - name: Attendance
  - name: Statistics
  - name: Federation Statistics

paths:

  /collectivities:
    post:
      tags: [Collectivities]
      summary: Create one or multiple collectivities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/CollectivityCreation'
                - type: array
                  items:
                    $ref: '#/components/schemas/CreateCollectivity'
      responses:
        "201":
          description: Created collectivities

    get:
      tags: [Collectivities]
      summary: List all collectivities
      responses:
        "200":
          description: List of collectivities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivity'

  /collectivities/{id}:
    get:
      tags: [Collectivities]
      summary: Get collectivity by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Collectivity found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        404:
          description: Collectivity not found

  /collectivities/{id}/informations:
    put:
      tags: [Collectivities]
      summary: Update collectivity informations
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectivityInformation'
      responses:
        200:
          description: Updated collectivity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'

  /collectivities/{id}/membershipFees:
    get:
      tags: [Treasury]
      summary: Retrieve membership fees
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Membership fees list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MembershipFee'

    post:
      tags: [Treasury]
      summary: Create membership fees
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMembershipFee'
      responses:
        200:
          description: Created fees

  /collectivities/{id}/transactions:
    get:
      tags: [Treasury]
      summary: Collectivity transactions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date
      responses:
        200:
          description: Transactions list

  /collectivities/{id}/financialAccounts:
    get:
      tags: [Treasury]
      summary: Get financial accounts at a given date
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: at
          required: true
          schema:
            type: string
            format: date
      responses:
        200:
          description: Financial accounts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FinancialAccount'

  /members:
    post:
      tags: [Members]
      summary: Create members (batch)
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMember'
      responses:
        201:
          description: Members created

  /members/{id}/payments:
    post:
      tags: [Treasury]
      summary: Create member payments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMemberPayment'
      responses:
        201:
          description: Payments created

components:
  schemas:

    Collectivity:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        number:
          type: string
        city:
          type: string
        location:
          type: string
        structure:
          $ref: '#/components/schemas/CollectivityStructure'
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'

    CollectivityCreation:
      type: object
      required: [name, city]
      properties:
        name:
          type: string
        city:
          type: string

    CreateCollectivity:
      type: object
      properties:
        location:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/MemberIdentifier'
        federationApproval:
          type: boolean
        structure:
          $ref: '#/components/schemas/CreateCollectivityStructure'

    CollectivityInformation:
      type: object
      properties:
        name:
          type: string
        number:
          type: string

    Member:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        email:
          type: string

    CreateMember:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        collectivityIdentifier:
          type: string
        referees:
          type: array
          items:
            $ref: '#/components/schemas/MemberIdentifier'

    MemberIdentifier:
      type: string

    CreateMembershipFee:
      type: object
      properties:
        amount:
          type: number
        frequency:
          $ref: '#/components/schemas/Frequency'

    MembershipFee:
      allOf:
        - $ref: '#/components/schemas/CreateMembershipFee'
      properties:
        id:
          type: string

    CreateMemberPayment:
      type: object
      properties:
        amount:
          type: number
        paymentMode:
          $ref: '#/components/schemas/PaymentMode'

    FinancialAccount:
      oneOf:
        - $ref: '#/components/schemas/CashAccount'
        - $ref: '#/components/schemas/MobileBankingAccount'
        - $ref: '#/components/schemas/BankAccount'

    CashAccount:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number

    MobileBankingAccount:
      type: object
      properties:
        id:
          type: string
        holderName:
          type: string
        mobileNumber:
          type: string
        amount:
          type: number

    BankAccount:
      type: object
      properties:
        id:
          type: string
        holderName:
          type: string
        bankName:
          type: string
        amount:
          type: number

    CollectivityStructure:
      type: object
      properties:
        president:
          $ref: '#/components/schemas/Member'
        secretary:
          $ref: '#/components/schemas/Member'

    CreateCollectivityStructure:
      type: object
      properties:
        president:
          $ref: '#/components/schemas/MemberIdentifier'

    Gender:
      type: string
      enum: [MALE, FEMALE]

    Frequency:
      type: string
      enum: [MONTHLY, ANNUALLY]

    PaymentMode:
      type: string
      enum: [CASH, MOBILE_BANKING, BANK_TRANSFER]