openapi: 3.1.0
info:
  title: API federation de collectivite agricole
  description: Spécification OpenAPI pour la fédération nationale de collectivités agricoles.
    Couvre les fonctionnalités A à G du TD PROG3.
  version: 1.0.0
  servers:
    - url: http://localhost:8080/api/v1
      description: Serveur de développement local

paths:
  /collectivites:
    post:
      tags: [A - Collectivités]
      summary: Ouvrir une nouvelle collectivité (Fonctionnalité A)
      description: Crée une collectivité uniquement si les conditions (≥10 membres avec ≥6 mois d’ancienneté, postes occupés, autorisation fédération) sont remplies.
      operationId: ouvrirCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreation'
      responses:
        '201':
          description: Collectivité créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '400':
          description: Conditions d’ouverture non remplies

    get:
      tags: [A - Collectivités]
      summary: Lister toutes les collectivités
      responses:
        '200':
          description: Liste des collectivités
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivite'

components:
  schemas:
    Collectivite:
      type: object
      properties:
        id_collectivite:
          type: integer
        nom:
          type: string
        ville:
          type: string
        date_creation:
          type: string
          format: date
        specialite_id:
          type: integer

    CollectiviteCreation:
      type: object
      required: [ nom, ville, specialite_id ]
      properties:
        nom:
          type: string
        ville:
          type: string
        specialite_id:
          type: integer