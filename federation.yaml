openapi: 3.1.0
info:
  title: API federation de collectivite agricole
  description: Spécification OpenAPI pour la fédération nationale de collectivités agricoles.
    Couvre les fonctionnalités A à G du TD PROG3.
  version: 1.0.0
  servers:
    - url: http://localhost:8080/api/v1
      description: Serveur de développement local

paths:
  /collectivites:
    post:
      tags: [A - Collectivités]
      summary: Ouvrir une nouvelle collectivité (Fonctionnalité A)
      description: Crée une collectivité uniquement si les conditions (≥10 membres avec ≥6 mois d’ancienneté, postes occupés, autorisation fédération) sont remplies.
      operationId: ouvrirCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectiviteCreation'
      responses:
        '201':
          description: Collectivité créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '400':
          description: Conditions d’ouverture non remplies

    get:
      tags: [A - Collectivités]
      summary: Lister toutes les collectivités
      responses:
        '200':
          description: Liste des collectivités
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivite'

  /collectivites/{collectiviteId}/membres:
    post:
      tags: [ B - Membres ]
      summary: Admettre un nouveau membre dans une collectivité (Fonctionnalité B)
      description: Nécessite parrainage par membre confirmé (>90 jours) + paiement des 50 000 MGA.
      operationId: admettreMembre
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembreAdmission'
      responses:
        '201':
          description: Membre admis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'

  /cotisations:
    post:
      tags: [ C - Cotisations ]
      summary: Enregistrer une cotisation (Fonctionnalité C)
      operationId: creerCotisation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CotisationCreation'
      responses:
        '201':
          description: Cotisation créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'

  /encaissements:
    post:
      tags: [ C - Cotisations ]
      summary: Enregistrer un encaissement (Fonctionnalité C)
      operationId: enregistrerEncaissement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncaissementCreation'
      responses:
        '201':
          description: Encaissement enregistré avec succès

  /comptes:
    get:
      tags: [ D - Trésorerie ]
      summary: Lister tous les comptes (collectivités + fédération)
      responses:
        '200':
          description: Liste des comptes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

  /activites:
    post:
      tags: [ E - Activités ]
      summary: Créer une activité (obligatoire ou exceptionnelle) - Fonctionnalité E
      operationId: creerActivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActiviteCreation'
      responses:
        '201':
          description: Activité créée

    get:
      tags: [ E - Activités ]
      summary: Lister les activités

  /presences:
    post:
      tags: [ F - Assiduité ]
      summary: Enregistrer la présence d’un membre (Fonctionnalité F)
      operationId: enregistrerPresence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresenceEnregistrement'
      responses:
        '201':
          description: Présence enregistrée

  /collectivites/{collectiviteId}/statistiques:
    get:
      tags: [ G - Statistiques ]
      summary: Statistiques détaillées d’une collectivité (Fonctionnalité G)
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
        - name: mois
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: annee
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Rapport statistique complet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportStatistique'

  /federation/statistics:
    get:
      summary: Obtenir les statistiques globales de la fédération
      tags:
        - Federation Statistics
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Statistiques récupérées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FederationStats'

components:
  schemas:
    Collectivite:
      type: object
      properties:
        id_collectivite:
          type: integer
        nom:
          type: string
        ville:
          type: string
        date_creation:
          type: string
          format: date
        specialite_id:
          type: integer

    CollectiviteCreation:
      type: object
      required: [ nom, ville, specialite_id ]
      properties:
        nom:
          type: string
        ville:
          type: string
        specialite_id:
          type: integer

    Membre:
      type: object
      properties:
        id_membre:
          type: integer
        nom:
          type: string
        prenom:
          type: string
        date_naissance:
          type: string
          format: date
        genre:
          type: string
          enum: [ Masculin, Féminin ]
        adresse:
          type: string
        email:
          type: string
        telephone:
          type: string
        date_adhesion:
          type: string
          format: date
        est_demission:
          type: boolean
        metier:
          type: string

    MembreAdmission:
      type: object
      required: [ nom, prenom, date_naissance, genre, adresse, email, telephone, parrain_id, collectivite_id ]
      properties:
        nom:
          type: string
        prenom:
          type: string
        date_naissance:
          type: string
          format: date
        genre:
          type: string
          enum: [ Masculin, Féminin ]
        adresse:
          type: string
        email:
          type: string
        telephone:
          type: string
        parrain_id:
          type: integer
        collectivite_id:
          type: integer

    Cotisation:
      type: object
      properties:
        id_cotisation:
          type: integer
        membre_id:
          type: integer
        collectivite_id:
          type: integer
        type_cotisation:
          type: string
          enum: [ mensuelle, annuelle, ponctuelle ]
        montant:
          type: number
          format: decimal
        date_echeance:
          type: string
          format: date

    CotisationCreation:
      type: object
      required: [ membre_id, collectivite_id, type_cotisation, montant ]
      properties:
        membre_id:
          type: integer
        collectivite_id:
          type: integer
        type_cotisation:
          type: string
          enum: [ mensuelle, annuelle, ponctuelle ]
        montant:
          type: number
          format: decimal

    EncaissementCreation:
      type: object
      required: [ cotisation_id, montant, date_encaissement, mode_paiement, compte_id ]
      properties:
        cotisation_id:
          type: integer
        montant:
          type: number
        date_encaissement:
          type: string
          format: date-time
        mode_paiement:
          type: string
          enum: [ espece, virement_bancaire, mobile_money ]
        compte_id:
          type: integer

    Compte:
      type: object
      properties:
        id_compte:
          type: integer
        owner_type:
          type: string
          enum: [ collectivite, federation ]
        owner_id:
          type: integer
        type_compte:
          type: string
          enum: [ caisse, bancaire, mobile_money ]
        titulaire:
          type: string
        banque_service:
          type: string
        numero_compte_ou_telephone:
          type: string
        solde:
          type: number
          format: decimal

    Activite:
      type: object
      properties:
        id_activite:
          type: integer
        owner_type:
          type: string
          enum: [ collectivite, federation ]
        owner_id:
          type: integer
        titre:
          type: string
        type_activite:
          type: string
        date:
          type: string
          format: date-time
        presence_obligatoire:
          type: boolean
        description:
          type: string

    ActiviteCreation:
      type: object
      required: [ owner_type, owner_id, titre, date ]
      properties:
        owner_type:
          type: string
          enum: [ collectivite, federation ]
          owner_id:
            type: integer
          titre:
            type: string
          type_activite:
            type: string
          date:
            type: string
            format: date-time
          presence_obligatoire:
            type: boolean
          description:
            type: string

    PresenceEnregistrement:
      type: object
      required: [ activite_id, membre_id, est_present ]
      properties:
        activite_id:
          type: integer
        membre_id:
          type: integer
        est_present:
          type: boolean
        motif_absence:
          type: string

    RapportStatistique:
      type: object
      properties:
        collectivite_id:
          type: integer
        mois:
          type: integer
        annee:
          type: integer
        taux_assiduite_globale:
          type: number
          format: float
        nb_membres_actifs:
          type: integer
        statistiques_par_membre:
          type: array
          items:
            type: object
            properties:
              membre_id:
                type: integer
              taux_assiduite:
                type: number
              montant_encaisse:
                type: number
              montant_impaye:
                type: number

    FederationStats:
      type: object
      properties:
        collectivities:
          type: array
          items:
            type: object
            properties:
              collectivityId:
                type: integer
              collectivityName:
                type: string

              attendanceRate:
                type: number
                format: float
                example: 0.85

              upToDateMembersPercentage:
                type: number
                format: float
                example: 0.70

              newMembersCount:
                type: integer
                example: 15