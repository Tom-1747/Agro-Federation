openapi: 3.1.0

info:
  title: Agricultural Collectivity Federation API
  description: OpenAPI specification for the National Federation of Agricultural Collectivities.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Collectivities
  - name: Members
  - name: Contributions
  - name: Treasury
  - name: Activities
  - name: Attendance
  - name: Statistics
  - name: Federation Statistics

paths:

  /collectivities:
    post:
      tags: [Collectivities]
      summary: Open a new collectivity
      operationId: openCollectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectivityCreation'
      responses:
        "201":
          description: Collectivity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        "400":
          description: Invalid request

    get:
      tags: [Collectivities]
      summary: List all collectivities
      responses:
        "200":
          description: List of collectivities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivity'

  /collectivities/{collectivityId}:
    patch:
      tags: [Collectivities]
      summary: Assign number and name to a collectivity
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignCollectivityIdentity'
      responses:
        "200":
          description: Updated collectivity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        "400":
          description: Name or number already exists
        "404":
          description: Collectivity not found

  /collectivities/{collectivityId}/members:
    post:
      tags: [Members]
      summary: Admit a new member
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberAdmission'
      responses:
        "201":
          description: Member created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'

  /contributions:
    post:
      tags: [Contributions]
      summary: Create a contribution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContributionCreation'
      responses:
        "201":
          description: Contribution created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contribution'

  /collections:
    post:
      tags: [Contributions]
      summary: Register a collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionCreation'
      responses:
        "201":
          description: Collection registered

  /accounts:
    get:
      tags: [Treasury]
      summary: List accounts
      responses:
        "200":
          description: Accounts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'

  /activities:
    post:
      tags: [Activities]
      summary: Create activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityCreation'
      responses:
        "201":
          description: Activity created

    get:
      tags: [Activities]
      summary: List activities
      responses:
        "200":
          description: Activities list

  /attendance:
    post:
      tags: [Attendance]
      summary: Register attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRegistration'
      responses:
        "201":
          description: Attendance registered

  /collectivities/{collectivityId}/statistics:
    get:
      tags: [Statistics]
      summary: Collectivity statistics
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: string
        - name: month
          in: query
          required: true
          schema:
            type: integer
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Statistics report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticalReport'

  /federation/statistics:
    get:
      tags: [Federation Statistics]
      summary: Global federation statistics
      responses:
        "200":
          description: Federation stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FederationStats'

components:
  schemas:

    Collectivity:
      type: object
      properties:
        id:
          type: string
        number:
          type: string
        name:
          type: string
        city:
          type: string
        specialtyId:
          type: integer
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'

    CollectivityCreation:
      type: object
      required: [name, city, specialty_id]
      properties:
        name:
          type: string
        city:
          type: string
        specialty_id:
          type: integer

    Member:
      type: object
      properties:
        id:
          type: integer
        collectivityId:
          type: string
        lastName:
          type: string
        firstNames:
          type: string
        membershipDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [ACTIVE, RESIGNED, TRANSFERRED]

    MemberAdmission:
      type: object
      required:
        - sponsorId
        - lastName
        - firstNames
        - birthDate
        - gender
        - address
        - occupation
        - phoneNumber
        - email
        - paymentMethod
      properties:
        sponsorId:
          type: integer
        lastName:
          type: string
        firstNames:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          type: string
          enum: [M, F, OTHER]
        address:
          type: string
        occupation:
          type: string
        phoneNumber:
          type: string
        email:
          type: string
        paymentMethod:
          type: string
          enum: [MOBILE_MONEY, BANK_TRANSFER]

    Contribution:
      type: object
      properties:
        contribution_id:
          type: integer
        member_id:
          type: integer
        collectivity_id:
          type: integer
        contribution_type:
          type: string
        amount:
          type: number
        due_date:
          type: string
          format: date

    ContributionCreation:
      type: object
      required: [member_id, collectivity_id, contribution_type, amount]
      properties:
        member_id:
          type: integer
        collectivity_id:
          type: integer
        contribution_type:
          type: string
        amount:
          type: number

    CollectionCreation:
      type: object
      required: [contribution_id, amount, collection_date, payment_method, account_id]
      properties:
        contribution_id:
          type: integer
        amount:
          type: number
        collection_date:
          type: string
          format: date-time
        payment_method:
          type: string
        account_id:
          type: integer

    Account:
      type: object
      properties:
        account_id:
          type: integer
        owner_type:
          type: string
        owner_id:
          type: integer
        account_type:
          type: string
        balance:
          type: number

    ActivityCreation:
      type: object
      required: [owner_type, owner_id, title, date]
      properties:
        owner_type:
          type: string
        owner_id:
          type: integer
        title:
          type: string
        activity_type:
          type: string
        date:
          type: string
          format: date-time
        mandatory_attendance:
          type: boolean
        description:
          type: string

    AttendanceRegistration:
      type: object
      required: [activity_id, member_id, is_present]
      properties:
        activity_id:
          type: integer
        member_id:
          type: integer
        is_present:
          type: boolean
        absence_reason:
          type: string

    StatisticalReport:
      type: object
      properties:
        collectivity_id:
          type: string
        month:
          type: integer
        year:
          type: integer
        global_attendance_rate:
          type: number
        active_members_count:
          type: integer

    FederationStats:
      type: object
      properties:
        collectivities:
          type: array
          items:
            type: object
            properties:
              collectivityId:
                type: string
              collectivityName:
                type: string
              attendanceRate:
                type: number
              newMembersCount:
                type: integer

    AssignCollectivityIdentity:
      type: object
      required: [number, name]
      properties:
        number:
          type: string
        name:
          type: string